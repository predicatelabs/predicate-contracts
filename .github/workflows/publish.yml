name: Publish Contracts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.0). The tag must already exist in the repository.'
        required: true
        type: string

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"
          echo "Version: ${TAG#v}"

      - name: Checkout workflow branch
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Save contrafactory config
        run: |
          if [ -f "contrafactory.toml" ]; then
            cp contrafactory.toml /tmp/contrafactory.toml
            echo "Saved contrafactory.toml from workflow branch"
          elif [ -f "cf.toml" ]; then
            cp cf.toml /tmp/contrafactory.toml
            echo "Saved cf.toml from workflow branch"
          else
            echo "::error::No contrafactory.toml or cf.toml found on workflow branch"
            exit 1
          fi

      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Restore contrafactory config
        run: |
          if [ -f "contrafactory.toml" ]; then
            echo "Tag already has contrafactory.toml — using it"
          else
            cp /tmp/contrafactory.toml contrafactory.toml
            echo "Tag missing contrafactory.toml — restored from workflow branch"
          fi

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: forge build --build-info --sizes

      - name: Run tests
        run: forge test -vvv

      - name: Install Contrafactory CLI
        uses: jaxxstorm/action-install-gh-release@v2.1.0
        with:
          repo: pendergraft/contrafactory
          extension-matching: disable
          rename-to: contrafactory
          chmod: 0755

      - name: Publish (dry run)
        env:
          CONTRAFACTORY_SERVER: ${{ secrets.CONTRAFACTORY_SERVER }}
          CONTRAFACTORY_API_KEY: ${{ secrets.CONTRAFACTORY_API_KEY }}
        run: contrafactory publish --version ${{ steps.tag.outputs.version }} --dry-run

      - name: Publish
        env:
          CONTRAFACTORY_SERVER: ${{ secrets.CONTRAFACTORY_SERVER }}
          CONTRAFACTORY_API_KEY: ${{ secrets.CONTRAFACTORY_API_KEY }}
        run: |
          OUTPUT=$(contrafactory publish --version ${{ steps.tag.outputs.version }} 2>&1) || true
          echo "$OUTPUT"
          # Fail on real errors, but not if every failure is VERSION_EXISTS
          if echo "$OUTPUT" | grep -q "failed"; then
            NON_EXISTS_FAILURES=$(echo "$OUTPUT" | grep "^   X" | grep -v "VERSION_EXISTS" || true)
            if [ -n "$NON_EXISTS_FAILURES" ]; then
              echo "::error::Publish failed with errors other than VERSION_EXISTS"
              exit 1
            fi
            echo "::warning::All packages already published at this version — skipping."
          fi
